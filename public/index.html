<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>实时对讲助手</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin:0; background:#0d1117; color:#e6edf3; }
    header { padding:1rem 1.25rem; background:#161b22; display:flex; align-items:center; gap:1rem; }
    h1 { font-size:1.1rem; margin:0; }
    #status { font-size:0.8rem; opacity:0.7; }
    main { display:flex; height:calc(100vh - 60px); }
    #left { flex: 2; display:flex; flex-direction:column; border-right:1px solid #30363d; }
    #right { flex: 1; display:flex; flex-direction:column; }
    #log { flex:1; padding:1rem; overflow:auto; font-size:0.85rem; line-height:1.3; }
    #log .msg { margin-bottom:0.65rem; }
    #log .msg span.role { display:inline-block; min-width:3.5rem; font-weight:bold; color:#79c0ff; }
    #controls { padding:0.75rem 1rem; border-top:1px solid #30363d; display:flex; gap:0.5rem; }
    button { background:#238636; color:white; border:1px solid #2ea043; padding:0.5rem 0.8rem; cursor:pointer; font-size:0.8rem; border-radius:4px; }
    button[disabled] { opacity:0.5; cursor:not-allowed; }
    button.secondary { background:#30363d; border-color:#30363d; }
    textarea { flex:1; resize:vertical; background:#161b22; color:#e6edf3; border:1px solid #30363d; border-radius:4px; padding:0.5rem; font-size:0.8rem; }
    #wave { height:140px; background:#161b22; display:flex; align-items:flex-end; gap:2px; padding:8px; }
    #wave div { flex:1; background:#238636; opacity:0.25; transition:height 80ms linear, opacity 200ms; }
    #wave div.active { opacity:0.9; }
    #audioOut { width:100%; height:46px; background:#161b22; border-top:1px solid #30363d; display:flex; align-items:center; padding:0 1rem; font-size:0.75rem; }
    #configPanel { padding:0.75rem 1rem; border-bottom:1px solid #30363d; display:flex; gap:0.75rem; flex-wrap:wrap; }
    label small { opacity:0.7; }
    .field-note { display:block; margin-top:2px; max-width:15rem; color:#8b949e; font-size:0.68rem; line-height:1.25; }
    select[disabled] { opacity:0.6; cursor:not-allowed; }
    input[type=number] { width:4.5rem; }
    input, select { background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:4px; padding:0.35rem 0.4rem; font-size:0.75rem; }
    /* Latency Panel */
    #latencyPanel { position:absolute; top:68px; right:12px; width:260px; background:#161b22; border:1px solid #30363d; border-radius:6px; font-size:12px; display:flex; flex-direction:column; max-height:340px; }
    #latencyPanel header { display:flex; align-items:center; justify-content:space-between; padding:4px 8px; background:#1f242c; border-bottom:1px solid #30363d; font-weight:600; font-size:12px; }
    #latLatencySummary { padding:6px 8px; display:grid; grid-template-columns: 70px 1fr; row-gap:2px; column-gap:4px; }
    #latHistory { flex:1; overflow:auto; padding:4px 8px; font-family:ui-monospace,monospace; line-height:1.25; }
    #latHistory .row { border-bottom:1px solid #30363d; padding:2px 0; }
    #latHistory .row:last-child { border-bottom:none; }
    #latencyPanel button { background:#30363d; border-color:#30363d; padding:2px 6px; font-size:11px; }
    #latencyPanel footer { padding:4px 8px; display:flex; gap:4px; flex-wrap:wrap; }
    .lat-badge { background:#23863622; border:1px solid #2ea04333; padding:1px 4px; border-radius:3px; }
  </style>
</head>
<body data-transcription-model="gpt-4o-mini-transcribe">
  <header>
    <h1>实时对讲助手 (GPT Realtime)</h1>
    <div id="status">未连接</div>
  </header>
  <main>
    <section id="left">
      <div id="configPanel">
  <label>任务类型
    <select id="taskType" aria-label="任务类型">
      <option value="conversation">实时对话</option>
      <option value="transcription">实时转写</option>
      <option value="translation">实时翻译</option>
      <option value="azure-cognitive">Azure认知服务</option>
    </select>
  </label>
  <label id="modelControl">模型
    <select id="model" aria-label="模型">
      <option value="">(加载中)</option>
      <option value="gpt-realtime-1">gpt-realtime-1</option>
      <option value="gpt-realtime-1.5">gpt-realtime-1.5</option>
      <option value="gpt-realtime-2">gpt-realtime-2</option>
      <option value="gpt-realtime-translate">gpt-realtime-translate</option>
      <option value="gpt-realtime-whisper">gpt-realtime-whisper</option>
    </select>
  </label>
  <label id="connectionTypeControl">连接类型
    <select id="connType">
      <option value="websocket" selected>WebSocket</option>
      <option value="webrtc">WebRTC</option>
    </select>
  </label>
  <label id="gaPathControl"><input type="checkbox" id="useGaPath" checked /> 使用 GA v1 路径</label>
  <label id="temperatureControl">温度 <input id="temp" type="number" step="0.1" placeholder="-" /></label>
  <label id="maxTokensControl">最大Tokens <input id="maxTokens" type="number" placeholder="-" /></label>
  <label id="voiceControl">音色
    <select id="voice" aria-label="音色">
      <option value="alloy">alloy</option>
      <option value="ash">ash</option>
      <option value="ballad">ballad</option>
      <option value="coral">coral</option>
      <option value="echo">echo</option>
      <option value="sage">sage</option>
      <option value="shimmer">shimmer</option>
      <option value="verse">verse</option>
    </select>
  </label>
  <label id="azureOutputControl" hidden>输出
    <select id="azureOutputMode" aria-label="Azure认知服务输出">
      <option value="transcription" selected>转写文本</option>
      <option value="translation">翻译文本</option>
    </select>
    <small id="azureOutputNote" class="field-note"></small>
  </label>
  <label id="inputLanguageControl" hidden>输入语言
    <select id="inputLanguage" aria-label="输入语言">
      <option value="auto" selected>自动</option>
      <option value="zh">中文</option>
      <option value="zh-CN">普通话（中国大陆）</option>
      <option value="zh-HK">粤语（香港）</option>
      <option value="yue-CN">粤语（简体）</option>
      <option value="zh-TW">国语（台湾）</option>
      <option value="zh-CN-sichuan">四川话</option>
      <option value="wuu-CN">吴语</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="pt">Português</option>
      <option value="ar">العربية</option>
    </select>
    <small id="inputLanguageNote" class="field-note"></small>
  </label>
  <label id="targetLanguageControl" hidden>目标语言
    <select id="targetLanguage" aria-label="目标语言">
      <option value="zh">中文</option>
      <option value="en" selected>English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="pt">Português</option>
      <option value="ar">العربية</option>
    </select>
  </label>
        <label id="systemPromptControl" style="flex:1 1 100%; display:flex; flex-direction:column; gap:2px;">
          <span>系统Prompt <small>作为指令 (instructions)</small></span>
          <textarea id="systemPrompt" rows="2" placeholder="例如: 你是一名双语(中英文)实时对讲助手, 回答精炼。"></textarea>
        </label>
  <label id="serverTurnControl"><input type="checkbox" id="enableServerTurn" checked /> 服务器断句</label>
        <label id="serverTurnThresholdControl">Turn阈值<input id="serverTurnThreshold" type="number" step="0.05" value="0.5" /></label>
        <label id="serverTurnSilenceControl">Turn静音(ms)<input id="serverTurnSilenceMs" type="number" value="650" /></label>
        <label id="sttProviderControl">辅助转写
          <select id="sttProvider" aria-label="辅助转写">
            <option value="none" selected>关闭</option>
            <option value="browser">浏览器本地</option>
          </select>
          <small id="sttProviderNote" class="field-note"></small>
        </label>
        <input type="checkbox" id="enableLocalStt" hidden />
        <label id="audioFileControl" hidden>音频文件
          <input id="audioFileInput" type="file" accept="audio/*,.wav,.mp3,.m4a,.ogg,.webm" />
          <button id="transcribeFileBtn" type="button" class="secondary">转写文件</button>
          <small id="audioFileNote" class="field-note"></small>
        </label>
        <label id="autoSendSttControl"><input type="checkbox" id="autoSendStt" /> 自动发送转写</label>
        <label id="nativeWebSearchControl"><input type="checkbox" id="enableNativeWebSearch" /> 原生 Web Search</label>
  <label><input type="checkbox" id="showLatencyPanel" /> 延迟面板</label>
  <label><input type="checkbox" id="enableLatencyLog" /> 延迟日志</label>
        <div id="mcpControl" style="display:flex; align-items:center; gap:0.5rem;">
          <button id="btnMcpConfig" type="button" class="secondary" style="white-space:nowrap;">配置 MCP</button>
          <span id="mcpStatus" style="font-size:0.75rem; opacity:0.8;">MCP: 未启用</span>
          <button id="btnReloadCfg" type="button" class="secondary" style="white-space:nowrap;">刷新配置</button>
          <button id="btnResetCfg" type="button" class="secondary" style="white-space:nowrap;">重置配置</button>
        </div>
      </div>
      <div id="log"></div>
      <div id="controls">
        <button id="connectBtn">连接</button>
        <button id="disconnectBtn" disabled>断开</button>
        <button id="micBtn" class="secondary" disabled>开始说话</button>
        <button id="sendTextBtn" class="secondary" disabled>发送文本</button>
      </div>
      <div id="textInputPanel" style="padding:0.5rem 1rem; border-top:1px solid #30363d;">
        <textarea id="textInput" rows="2" placeholder="输入文字然后点击发送或按 Ctrl+Enter"></textarea>
      </div>
    </section>
    <section id="right">
      <div id="wave"></div>
      <div id="audioOut">音频输出</div>
    </section>
  </main>
  <div id="latencyPanel" style="display:none;">
    <header>
      <span>延迟监控</span>
      <div>
        <button id="btnLatToggle">隐藏</button>
      </div>
    </header>
    <div id="latLatencySummary">
      <div>首字:</div><div id="latAvgText">-</div>
      <div>首音频:</div><div id="latAvgAudioDelta">-</div>
      <div>首播放:</div><div id="latAvgAudioPlay">-</div>
      <div>当前回合:</div><div id="latCurrentTurn">-</div>
    </div>
    <div id="latHistory"></div>
    <footer>
      <button id="btnLatShow" style="display:none;">显示</button>
      <button id="btnLatExport">导出CSV</button>
      <button id="btnLatClear">清空</button>
      <button id="btnLatPin">固定</button>
    </footer>
  </div>
  <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
  <script type="module" src="/app.js?v=20260528-azure-speech-fix"></script>
</body>
</html>
