<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>MCP 配置</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin:0; background:#0d1117; color:#e6edf3; }
    header { padding:1rem 1.5rem; background:#161b22; border-bottom:1px solid #30363d; }
    main { padding:1.25rem 1.5rem; display:flex; flex-direction:column; gap:1rem; }
    h1 { font-size:1.15rem; margin:0; }
    form { display:flex; flex-direction:column; gap:0.9rem; }
    label { display:flex; flex-direction:column; gap:0.35rem; font-size:0.85rem; }
    input, textarea, select { background:#0d1117; color:#e6edf3; border:1px solid #30363d; border-radius:6px; padding:0.55rem 0.65rem; font-size:0.85rem; }
    textarea { resize:vertical; min-height:96px; }
    small { opacity:0.7; font-size:0.75rem; }
    .actions { display:flex; gap:0.75rem; }
    button { background:#238636; color:white; border:1px solid #2ea043; padding:0.55rem 1.1rem; border-radius:6px; cursor:pointer; font-size:0.85rem; }
    button.secondary { background:#30363d; border-color:#30363d; }
    button.danger { background:#d1242f; border-color:#f85149; }
    #status { font-size:0.8rem; opacity:0.8; }
    .preview { background:#161b22; border:1px dashed #30363d; padding:0.75rem; border-radius:6px; font-family:ui-monospace,monospace; font-size:0.78rem; white-space:pre-wrap; }
  </style>
</head>
<body>
  <header>
    <h1>MCP 服务器配置</h1>
    <div id="status">未保存的更改</div>
  </header>
  <main>
    <form id="mcpForm">
      <label>
        MCP Server Label
        <input id="serverLabel" placeholder="例如: web-search" />
        <small>用于日志展示和审批提示，如果留空则自动使用 URL。</small>
      </label>
      <label>
        MCP Server URL
        <input id="serverUrl" placeholder="https://your-mcp-server.example.com" required />
        <small>Realtime API 将通过此地址连接远程 MCP 服务。</small>
      </label>
      <label>
        Authorization Header
        <input id="authorization" placeholder="例如: Bearer xxx 或 apikey xxx" />
        <small>可选。若 MCP 服务需要身份验证，请填完整的 Header 值。</small>
      </label>
      <label>
        Require Approval
        <select id="requireApproval">
          <option value="default">默认 (服务端策略)</option>
          <option value="never">never - 自动允许</option>
          <option value="always">always - 每次审批</option>
        </select>
        <small>控制模型调用该 MCP 工具时是否需要人工审批。</small>
      </label>
      <label>
        自定义 Headers (JSON 或 key:value 每行)
        <textarea id="headers" placeholder='{"X-Org-Id":"123"}'></textarea>
        <small>用于传递额外请求头，例如租户信息。<strong>Authorization</strong> 会与上方输入合并。</small>
      </label>
      <label style="flex-direction:row; align-items:center; gap:0.5rem;">
        <input type="checkbox" id="enableTool" />
        <span>在新建 session 时启用 MCP tool</span>
      </label>
      <div class="actions">
        <button type="submit">保存配置</button>
        <button type="button" id="btnTest" class="secondary">预览声明</button>
        <button type="button" id="btnReset" class="danger">清除并禁用</button>
      </div>
    </form>
    <section>
      <h2 style="margin:0 0 0.35rem;font-size:0.95rem;">将发送的工具声明预览</h2>
      <div id="preview" class="preview">{ }
      </div>
    </section>
  </main>
  <script type="module" src="/mcp.js?v=20251009"></script>
</body>
</html>
